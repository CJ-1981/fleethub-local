<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetHub — Local File Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#181d26;--primary-hover:#0d1218;
  --canvas:#ffffff;--surface-soft:#f8fafc;--surface-strong:#e0e2e6;
  --hairline:#dddddd;--ink:#181d26;--body:#333840;--muted:#41454d;
  --ring:#458fff;--link:#1b61c9;
  --success:#006400;--success-bg:#dcfce7;--success-border:#39bf45;
  --warning:#b45309;--warning-bg:#fef3c7;--warning-border:#d97706;
  --destructive:#b91c1c;--destructive-bg:#fee2e2;--destructive-border:#dc2626;
  --info:#254fad;--info-bg:#dbeafe;--info-border:#458fff;
  --coral:#aa2d00;--forest:#0a2e0e;--cream:#f5e9d4;--mustard:#d9a441;
          --highlight-bg:#fef9c3;
  --radius-sm:6px;--radius-md:10px;--radius-lg:12px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --header-h:56px;--sidebar-w:240px;
}
body{font-family:var(--font);font-size:14px;color:var(--body);background:var(--canvas);line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface-strong);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* Landing */
.landing{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--surface-soft)}
.landing-card{text-align:center;max-width:480px;padding:48px 40px;background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--radius-md)}
.landing-logo{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:var(--primary);border-radius:var(--radius-sm);margin-bottom:20px}
.landing-logo svg{color:#fff;width:24px;height:24px}
.landing h1{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px}
.landing p{color:var(--muted);margin-bottom:32px;font-size:14px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid var(--hairline);border-radius:var(--radius-sm);background:var(--canvas);color:var(--ink);font-weight:500;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap}
.btn:hover{background:var(--surface-soft);border-color:var(--surface-strong)}
.btn:active{background:var(--surface-strong)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-hover);border-color:var(--primary-hover)}
.btn-sm{padding:4px 10px;font-size:13px}
.btn-danger{color:var(--destructive);border-color:var(--destructive-border)}
.btn-danger:hover{background:var(--destructive-bg)}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--surface-soft)}
.btn-icon{padding:6px;border-radius:var(--radius-sm);background:transparent;border:1px solid transparent}
.btn-icon:hover:not(:disabled){background:var(--surface-soft);border-color:var(--hairline)}
.btn-icon:disabled{opacity:0.3;cursor:not-allowed}
.shortcut-hint{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;padding:0 4px;margin-left:auto;background:rgba(255,255,255,.2);border-radius:3px;font-size:11px;font-weight:600;line-height:1}

/* Layout */
.app{display:none;height:100vh;overflow:hidden}
.app.active{display:flex;flex-direction:column}
.header{height:var(--header-h);border-bottom:1px solid var(--hairline);display:flex;align-items:center;padding:0 16px;gap:12px;background:var(--canvas);flex-shrink:0;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--ink);font-size:16px;text-decoration:none}
.header-logo .logo-icon{width:32px;height:32px;background:var(--primary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#fff}
.header-logo .logo-icon svg{width:18px;height:18px}
.header-filename{color:var(--muted);font-size:13px;padding:4px 10px;background:var(--surface-soft);border-radius:var(--radius-sm);border:1px solid var(--hairline);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-spacer{flex:1}
.header-actions{display:flex;align-items:center;gap:4px}
.lock-badge{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid}
.lock-badge.locked{color:var(--warning);background:var(--warning-bg);border-color:var(--warning-border)}
.lock-badge.unlocked{color:var(--success);background:var(--success-bg);border-color:var(--success-border)}
.save-indicator{font-size:12px;color:var(--muted);padding:0 8px}
.save-indicator.unsaved{color:var(--warning)}
.save-indicator.saving{color:var(--info)}

.body-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);border-right:1px solid var(--hairline);background:var(--canvas);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-nav{padding:8px;flex:1}
.sidebar-nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);color:var(--body);cursor:pointer;font-weight:500;transition:background .15s;border:none;background:transparent;width:100%;text-align:left}
.sidebar-nav-item:hover{background:var(--surface-soft)}
.sidebar-nav-item.active{background:var(--primary);color:#fff}
.sidebar-nav-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-nav-item .badge{margin-left:auto;background:var(--hairline);color:var(--body);font-size:11px;padding:1px 6px;border-radius:999px;font-weight:600}
.sidebar-nav-item.active .badge{background:rgba(255,255,255,.2);color:#fff}
.sidebar-cta{padding:12px;border-top:1px solid var(--hairline)}
.sidebar-cta .btn{width:100%;justify-content:center}

.main-content{flex:1;overflow-y:auto;padding:24px;max-width:1200px}
.mobile-nav{display:none;border-top:1px solid var(--hairline);overflow-x:auto;flex-shrink:0}
.mobile-nav-inner{display:flex;padding:8px;gap:4px}
.mobile-nav-item{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);color:var(--body);font-weight:500;font-size:13px;white-space:nowrap;border:none;background:transparent;cursor:pointer}
.mobile-nav-item.active{background:var(--primary);color:#fff}

@media(max-width:768px){
  .sidebar{display:none}
  .mobile-nav{display:block}
  .main-content{padding:16px}
  .header-filename{display:none}
}

/* Content */
.tab-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.tab-header h2{font-size:18px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
.tab-header h2 svg{width:20px;height:20px}
.tab-header-actions{margin-left:auto;display:flex;gap:8px}

/* Cards */
.card{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--canvas);overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--hairline);font-weight:600;font-size:13px;color:var(--ink);text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:8px}
.card-header svg{width:16px;height:16px}
.card-body{padding:16px}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:24px}
.stat-card{padding:16px;border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--canvas)}
.stat-card .stat-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-card .stat-icon svg{width:20px;height:20px;color:#fff}
.stat-card .stat-value{font-size:24px;font-weight:700;color:var(--ink);line-height:1}
.stat-card .stat-label{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500}

/* Two-column */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 12px;text-align:left;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--hairline);background:var(--surface-soft);white-space:nowrap;position:sticky;top:0}
tbody td{padding:10px 12px;border-bottom:1px solid var(--hairline);color:var(--body);vertical-align:middle}
tbody tr:hover{background:var(--surface-soft)}
tbody tr:last-child td{border-bottom:none}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid}
.badge-available{color:var(--success);background:var(--success-bg);border-color:var(--success-border)}
.badge-in-use{color:var(--info);background:var(--info-bg);border-color:var(--info-border)}
.badge-maintenance{color:var(--warning);background:var(--warning-bg);border-color:var(--warning-border)}
.badge-reserved{color:var(--coral);background:#fff1e6;border-color:#e8744f}
.badge-pending{color:var(--mustard);background:#fef9e7;border-color:#e8c84a}
.badge-confirmed{color:var(--info);background:var(--info-bg);border-color:var(--info-border)}
.badge-returned{color:var(--success);background:var(--success-bg);border-color:var(--success-border)}
.badge-cancelled{color:var(--muted);background:var(--surface-soft);border-color:var(--hairline)}
.badge-shared{color:var(--coral);background:#fff1e6;border-color:#e8744f}

/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--hairline);border-radius:var(--radius-sm);background:var(--canvas);color:var(--ink);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--ring);box-shadow:0 0 0 2px rgba(69,143,255,.15)}
textarea.form-input{resize:vertical;min-height:60px}
select.form-input{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.form-hint{font-size:12px;color:var(--muted);margin-top:2px}

/* Dialog */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.dialog-overlay.active{opacity:1;pointer-events:all}
.dialog{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--radius-md);width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.dialog-header{padding:16px 20px;border-bottom:1px solid var(--hairline);font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:between}
.dialog-header .btn-icon{margin-left:auto}
.dialog-body{padding:20px}
.dialog-footer{padding:12px 20px;border-top:1px solid var(--hairline);display:flex;justify-content:flex-end;gap:8px}

/* Search */
.search-bar{position:relative;max-width:320px}
.search-bar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
.search-bar input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--hairline);border-radius:var(--radius-sm);background:var(--canvas);outline:none}
.search-bar input:focus{border-color:var(--ring)}

/* Filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters select{padding:8px 12px;border:1px solid var(--hairline);border-radius:var(--radius-sm);background:var(--canvas);outline:none;min-width:120px}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 0;font-size:13px;color:var(--muted)}
.pagination button{padding:4px 10px;border:1px solid var(--hairline);border-radius:var(--radius-sm);background:var(--canvas);cursor:pointer;font-size:13px}
.pagination button:hover:not(:disabled){background:var(--surface-soft)}
.pagination button:disabled{opacity:.4;cursor:not-allowed}

/* Share panel */
.share-panel{background:var(--cream);border:1px solid #e8d4b8;border-radius:var(--radius-md);padding:14px;margin-top:12px}
.share-panel h4{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.share-panel h4 svg{width:16px;height:16px}
.share-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.share-tag{display:flex;align-items:center;gap:4px;padding:3px 8px;background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--radius-sm);font-size:13px}
.share-tag button{background:none;border:none;cursor:pointer;color:var(--muted);padding:0;font-size:16px;line-height:1}
.share-tag button:hover{color:var(--destructive)}

/* Chat */
.chat-panel{width:320px;border-left:1px solid var(--hairline);display:flex;flex-direction:column;background:var(--canvas);flex-shrink:0;transition:width .2s ease}
.chat-panel.collapsed{width:40px}
.chat-panel.collapsed .chat-header span,.chat-panel.collapsed .chat-header .chat-header-actions{display:none}
.chat-panel.collapsed .chat-header svg:first-child{display:none}
.chat-panel.collapsed .chat-header{justify-content:center}
.chat-panel.collapsed #chat-toggle-btn{margin-left:0}
.chat-panel.collapsed .chat-messages,.chat-panel.collapsed .chat-input-area{display:none}
@media(max-width:1100px){.chat-panel{display:none}}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--hairline);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;min-height:44px}
.chat-header svg{width:18px;height:18px;flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:85%;display:flex;gap:8px}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.chat-msg.assistant .chat-msg-avatar{background:var(--primary);color:#fff}
.chat-msg.user .chat-msg-avatar{background:var(--surface-strong);color:var(--ink)}
.chat-msg-bubble{padding:10px 14px;border-radius:var(--radius-md);font-size:13px;line-height:1.5;white-space:pre-wrap}
.chat-msg.assistant .chat-msg-bubble{background:var(--surface-soft);border:1px solid var(--hairline);color:var(--body)}
.chat-msg.user .chat-msg-bubble{background:var(--primary);color:#fff;border:1px solid var(--primary)}
.chat-input-area{padding:12px 16px;border-top:1px solid var(--hairline);display:flex;gap:8px;align-items:flex-end}
.chat-input-area textarea{flex:1;padding:8px 12px;border:1px solid var(--hairline);border-radius:var(--radius-sm);resize:none;outline:none;min-height:36px;max-height:120px;font-size:13px}
.chat-input-area textarea:focus{border-color:var(--ring)}

/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.settings-grid{grid-template-columns:1fr}}
.settings-card{border:1px solid var(--hairline);border-radius:var(--radius-md);overflow:hidden}
.settings-card-header{padding:12px 16px;border-bottom:1px solid var(--hairline);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:8px;color:var(--ink)}
.settings-card-header svg{width:16px;height:16px}
.settings-card-body{padding:16px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag-item{display:flex;align-items:center;gap:4px;padding:3px 10px;background:var(--surface-soft);border:1px solid var(--hairline);border-radius:999px;font-size:13px}
.tag-item button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;line-height:1;padding:0}
.tag-item button:hover{color:var(--destructive)}
.tag-input-row{display:flex;gap:8px}
.tag-input-row input{flex:1;padding:6px 10px;border:1px solid var(--hairline);border-radius:var(--radius-sm);outline:none}
.tag-input-row input:focus{border-color:var(--ring)}

/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.3}
.empty-state h3{font-size:16px;color:var(--ink);margin-bottom:4px}
.empty-state p{font-size:14px}

/* Lock alert banner */
.lock-alert{padding:12px 16px;background:var(--warning-bg);border-bottom:1px solid var(--warning-border);color:var(--warning);font-size:13px;display:flex;align-items:center;gap:8px;font-weight:500}
.lock-alert svg{width:18px;height:18px;flex-shrink:0}

/* Tooltip */
[data-tooltip]{position:relative}
[data-tooltip]:hover::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);padding:4px 8px;background:var(--ink);color:#fff;font-size:11px;border-radius:var(--radius-sm);white-space:nowrap;pointer-events:none;z-index:99999}
/* Suppress CSS tooltip on Gantt elements (JS tooltip handles these) */
.gantt-booking-bar[data-tooltip]:hover::after,.gantt-date-cell[data-tooltip]:hover::after,.gantt-time-cell[data-tooltip]:hover::after,.gantt-row-label[data-tooltip]:hover::after{display:none!important}

/* Custom fields table */
.cf-table{width:100%;border-collapse:collapse}
.cf-table th{padding:6px 10px;text-align:left;font-size:12px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--hairline)}
.cf-table td{padding:6px 10px;border-bottom:1px solid var(--hairline);font-size:13px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s infinite}

/* Vehicle list items */
.vehicle-status-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.vehicle-status-row .v-name{font-weight:500;color:var(--ink)}
.vehicle-status-row .v-plate{color:var(--muted);font-size:12px}

/* File info */
.file-info-card{padding:16px}
.file-info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--hairline);font-size:13px}
.file-info-row:last-child{border-bottom:none}
.file-info-row .label{color:var(--muted)}
.file-info-row .value{color:var(--ink);font-weight:500}

/* Toast */
.toast-container{position:fixed;top:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid;box-shadow:0 4px 12px rgba(0,0,0,.1);animation:fadeIn .2s ease;max-width:360px}
.toast-success{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.toast-error{background:var(--destructive-bg);color:var(--destructive);border-color:var(--destructive-border)}
.toast-info{background:var(--info-bg);color:var(--info);border-color:var(--info-border)}

/* Gantt Chart */
.gantt-container{overflow:auto;max-height:600px;border:1px solid var(--hairline);border-radius:var(--radius-sm)}
.gantt-header-row{display:grid;grid-template-columns:150px 1fr;position:sticky;top:0;background:var(--surface-strong);z-index:10}
.gantt-corner-cell{padding:8px 12px;font-weight:600;font-size:12px;border-bottom:1px solid var(--hairline);border-right:1px solid var(--hairline)}
.gantt-date-cells{display:flex}
.gantt-date-cell{flex:0 0 120px;padding:8px 4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;border-bottom:1px solid var(--hairline);border-right:1px solid var(--hairline);position:relative}
.gantt-date-cell.today{background:var(--highlight-bg)}
.gantt-date-cell.holiday-nationwide{background:var(--warning-bg)!important;border-color:var(--warning-border)!important}
.gantt-date-cell.holiday-state{background:#ffe4e6!important;border-color:#e8744f!important}
.gantt-time-cell.today{background:var(--highlight-bg)!important}
.gantt-time-cell.holiday-nationwide{background:var(--warning-bg)!important}
.gantt-time-cell.holiday-state{background:#ffe4e6!important}
.gantt-row{display:grid;grid-template-columns:150px 1fr;min-height:60px;border-bottom:1px solid var(--hairline)}
.gantt-row-label{padding:8px 12px;font-size:13px;font-weight:500;border-right:1px solid var(--hairline);display:flex;align-items:center}
.gantt-timeline{position:relative;min-height:60px;background:var(--surface-soft)}
.gantt-time-cell{position:absolute;flex:0 0 120px;height:100%;border-right:1px solid var(--hairline);background:var(--canvas);top:0}
.gantt-booking-bar{position:absolute;height:60px;top:0;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;line-height:60px;z-index:5;will-change:opacity,left}
.gantt-booking-bar:hover{opacity:.8}
.gantt-booking-bar.pending{background-color:#d9a441;background:#d9a441;color:#fff!important}
.gantt-booking-bar.confirmed{background-color:#254fad;background:#254fad;color:#fff!important}

<script>
// ===================== STATE =====================
const S = {
  fileHandle: null,
  fileName: '',
  data: null,
  dirty: false,
  saving: false,
  activeTab: 'dashboard',
  lockId: null,
  lockUser: null,
  lockedBy: null,
  editingVehicle: null,
  editingBooking: null,
  shareDialogBooking: null,
  bookingSearch: '',
  bookingVehicleFilter: '',
  bookingStatusFilter: '',
  bookingPage: 1,
  pageSize: 10,
  chatMessages: [],
  chatLoading: false,
  settingsTab: 'statuses',
  calendarView: 'week',
  calendarStart: new Date().toISOString(),
};

const DEFAULT_SETTINGS = {
  statuses: ['pending', 'confirmed', 'in-use', 'returned', 'cancelled'],
  vehicleTypes: ['sedan', 'suv', 'pickup', 'van', 'bus', 'motorcycle', 'other'],
  customColumns: [],
  shareMessage: 'Hi, I would like to share this ride with you. Is that possible?',
  germanState: null
};

// ===================== OS DETECTION =====================
const isMac = (navigator.userAgentData?.platform || navigator.platform || navigator.userAgent || '').toUpperCase().indexOf('MAC') >= 0;
const saveShortcut = isMac ? '⌘+Enter' : 'Ctrl+Enter';

function getDefaultData() {
  return {
    meta: { version: '1.0', lastModified: new Date().toISOString(), lockedBy: null, lockedAt: null, lockId: null },
    vehicles: [],
    bookings: [],
    settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS))
  };
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }
const _escDiv = document.createElement('div');
function esc(s) { if (s == null || s === '') return ''; _escDiv.textContent = String(s); return _escDiv.innerHTML; }
function escAttr(s) { if (s == null || s === '') return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function fmtDate(d) { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function fmtDateTime(d) { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function isToday(d) { if (!d) return false; const dt = new Date(d), now = new Date(); return dt.toDateString() === now.toDateString(); }
function isActive(b) { const now = new Date(); const s = new Date(b.periodStart), e = new Date(b.periodEnd); return now >= s && now <= e; }
function uid() { return 'User-' + Math.random().toString(36).substr(2, 6).toUpperCase(); }

// ===================== GERMAN HOLIDAYS =====================
// Format date as YYYY-MM-DD in local timezone (not UTC)
function formatDateLocal(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function getEasterDate(year) {
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}

function getGermanHolidays(year, state = null) {
  const holidays = [];
  const easterSunday = getEasterDate(year);
  const goodFriday = new Date(easterSunday); goodFriday.setDate(goodFriday.getDate() - 2);
  const easterMonday = new Date(easterSunday); easterMonday.setDate(easterMonday.getDate() + 1);
  const ascensionDay = new Date(easterSunday); ascensionDay.setDate(ascensionDay.getDate() + 39);
  const whitMonday = new Date(easterSunday); whitMonday.setDate(whitMonday.getDate() + 50);
  const corpusChristi = new Date(easterSunday); corpusChristi.setDate(corpusChristi.getDate() + 60);

  // Nationwide holidays
  holidays.push({ date: new Date(year, 0, 1), name: 'Neujahr', states: null });
  holidays.push({ date: goodFriday, name: 'Karfreitag', states: null });
  holidays.push({ date: easterMonday, name: 'Ostermontag', states: null });
  holidays.push({ date: new Date(year, 4, 1), name: 'Tag der Arbeit', states: null });
  holidays.push({ date: ascensionDay, name: 'Christi Himmelfahrt', states: null });
  holidays.push({ date: whitMonday, name: 'Pfingstmontag', states: null });
  holidays.push({ date: new Date(year, 9, 3), name: 'Tag der Deutschen Einheit', states: null });
  holidays.push({ date: new Date(year, 11, 25), name: 'Erster Weihnachtstag', states: null });
  holidays.push({ date: new Date(year, 11, 26), name: 'Zweiter Weihnachtstag', states: null });

  // State-specific holidays
  const BW = ['Baden-Württemberg', 'BW', 'baden-württemberg'];
  const BY = ['Bayern', 'Bavaria', 'BY', 'bayern'];
  const BE = ['Berlin', 'BE', 'berlin'];
  const BB = ['Brandenburg', 'BB', 'brandenburg'];
  const HB = ['Bremen', 'HB', 'bremen'];
  const HH = ['Hamburg', 'HH', 'hamburg'];
  const HE = ['Hessen', 'Hesse', 'HE', 'hessen'];
  const MV = ['Mecklenburg-Vorpommern', 'MV', 'mecklenburg-vorpommern'];
  const NI = ['Niedersachsen', 'Lower Saxony', 'NI', 'niedersachsen'];
  const NW = ['Nordrhein-Westfalen', 'North Rhine-Westphalia', 'NRW', 'NW', 'nordrhein-westfalen'];
  const RP = ['Rheinland-Pfalz', 'Rhineland-Palatinate', 'RP', 'rheinland-pfalz'];
  const SL = ['Saarland', 'SL', 'saarland'];
  const SN = ['Sachsen', 'Saxony', 'SN', 'sachsen'];
  const ST = ['Sachsen-Anhalt', 'Saxony-Anhalt', 'ST', 'sachsen-anhalt'];
  const SH = ['Schleswig-Holstein', 'SH', 'schleswig-holstein'];
  const TH = ['Thüringen', 'Thuringia', 'TH', 'thüringen'];

  const stateLower = state ? state.toLowerCase() : '';
  const isState = (arr) => state && arr.some(s => s.toLowerCase() === stateLower);

  // Epiphany (Jan 6)
  if (isState(BW) || isState(BY) || isState(ST)) {
    holidays.push({ date: new Date(year, 0, 6), name: 'Heilige Drei Könige', states: [BW[0], BY[0], ST[0]] });
  }

  // International Women's Day (Mar 8) - Berlin only
  if (isState(BE)) {
    holidays.push({ date: new Date(year, 2, 8), name: 'Internationaler Frauentag', states: [BE[0]] });
  }

  // Corpus Christi (60 days after Easter)
  if (isState(BW) || isState(BY) || isState(HE) || isState(NW) || isState(RP) || isState(SL)) {
    holidays.push({ date: corpusChristi, name: 'Fronleichnam', states: [BW[0], BY[0], HE[0], NW[0], RP[0], SL[0]] });
  }

  // Peace Festival (Aug 8) - Bavaria only
  if (isState(BY)) {
    holidays.push({ date: new Date(year, 7, 8), name: 'Friedensfest', states: [BY[0]] });
  }

  // Assumption Day (Aug 15)
  if (isState(BY) || isState(SL)) {
    holidays.push({ date: new Date(year, 7, 15), name: 'Mariä Himmelfahrt', states: [BY[0], SL[0]] });
  }

  // Reformation Day (Oct 31)
  if (isState(BB) || isState(HB) || isState(HH) || isState(MV) || isState(NI) || isState(SN) || isState(ST) || isState(SH) || isState(TH)) {
    holidays.push({ date: new Date(year, 9, 31), name: 'Reformationstag', states: [BB[0], HB[0], HH[0], MV[0], NI[0], SN[0], ST[0], SH[0], TH[0]] });
  }

  // All Saints' Day (Nov 1)
  if (isState(BW) || isState(BY) || isState(NW) || isState(RP) || isState(SL)) {
    holidays.push({ date: new Date(year, 10, 1), name: 'Allerheiligen', states: [BW[0], BY[0], NW[0], RP[0], SL[0]] });
  }

  // Day of Prayer and Repentance (Wednesday before Nov 23) - Saxony only
  const nov23 = new Date(year, 10, 23);
  let dayOfRepentance = new Date(nov23);
  dayOfRepentance.setDate(dayOfRepentance.getDate() - 1);
  while (dayOfRepentance.getDay() !== 3) {
    dayOfRepentance.setDate(dayOfRepentance.getDate() - 1);
  }
  if (isState(SN)) {
    holidays.push({ date: dayOfRepentance, name: 'Buß- und Bettag', states: [SN[0]] });
  }

  return holidays.map(h => ({
    date: formatDateLocal(h.date),
    name: h.name,
    isNationwide: !h.states
  }));
}

// ===================== FILE I/O =====================
async function openFile() {
  try {
    const [handle] = await window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }], multiple: false });
    S.fileHandle = handle;
    S.fileName = handle.name;
    const file = await handle.getFile();
    const text = await file.text();
    S.data = JSON.parse(text);
    // merge defaults
    if (!S.data.meta) S.data.meta = { version: '1.0', lastModified: new Date().toISOString(), lockedBy: null, lockedAt: null, lockId: null };
    if (!S.data.settings) S.data.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    if (!S.data.vehicles) S.data.vehicles = [];
    if (!S.data.bookings) S.data.bookings = [];
    // Ensure sortOrder exists on all vehicles (handles imports/legacy files)
    S.data.vehicles.forEach((v, i) => { if (v.sortOrder === undefined || v.sortOrder === null) v.sortOrder = i; });
    for (const k of Object.keys(DEFAULT_SETTINGS)) { if (!S.data.settings[k]) S.data.settings[k] = JSON.parse(JSON.stringify(DEFAULT_SETTINGS[k])); }
    saveRecentFile(handle.name);
    enterApp();
  } catch (e) { if (e.name !== 'AbortError') showToast('Failed to open file: ' + e.message, 'error'); }
}

async function createNewFile() {
  try {
    const handle = await window.showSaveFilePicker({ suggestedName: 'fleet-data.json', types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
    S.fileHandle = handle;
    S.fileName = handle.name;
    S.data = getDefaultData();
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(S.data, null, 2));
    await writable.close();
    saveRecentFile(handle.name);
    enterApp();
    showToast('New file created!', 'success');
  } catch (e) { if (e.name !== 'AbortError') showToast('Failed to create file: ' + e.message, 'error'); }
}

async function startDemo() {
  S.demoMode = true;
  S.fileName = 'demo-data.json';
  S.fileHandle = null;
  S.data = getDemoData();
  enterApp();
  document.getElementById('demo-banner').style.display = 'flex';
  showToast('Demo mode — explore freely, changes are not saved', 'info');
}

function exitDemo() {
  S.demoMode = false;
  document.getElementById('demo-banner').style.display = 'none';
  closeApp();
}

function getDemoData() {

  const today = now.toISOString().slice(0,10);
  const tomorrow = new Date(now.getTime() + 86400000).toISOString().slice(0,10);
  const nextWeek = new Date(now.getTime() + 7*86400000).toISOString().slice(0,10);
  const yesterday = new Date(now.getTime() - 86400000).toISOString().slice(0,10);
  return {
    meta: { version: '1.0', lastModified: now.toISOString(), lockedBy: null, lockedAt: null, lockId: null },
    vehicles: [

async function saveFile() {
  if (S.demoMode) { showToast('Demo mode — use Export to save a copy', 'info'); return; }
  if (!S.fileHandle) return;
  S.saving = true;
  updateSaveIndicator();
  try {
    S.data.meta.lastModified = new Date().toISOString();
    const writable = await S.fileHandle.createWritable();
    await writable.write(JSON.stringify(S.data, null, 2));
    await writable.close();
    S.dirty = false;
    showToast('File saved', 'success');
  } catch (e) { showToast('Save failed: ' + e.message, 'error'); }
  S.saving = false;
  updateSaveIndicator();
}

function markDirty() {
  S.dirty = true;
  updateSaveIndicator();
}

async function exportJSON() {
  const blob = new Blob([JSON.stringify(S.data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fleet-export-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===================== LOCKING =====================
function getMyLockId() { return localStorage.getItem('fleethub_lockid') || uid(); }

function initLock() {
  S.lockId = getMyLockId();
  localStorage.setItem('fleethub_lockid', S.lockId);
  checkLock();
  setInterval(checkLock, 30000);
  try {
    const bc = new BroadcastChannel('fleethub-lock');
    bc.onmessage = () => checkLock();
    S.bc = bc;
  } catch(e) {}
}

function checkLock() {
  const meta = S.data.meta;
  if (meta && meta.lockedBy && meta.lockedBy !== S.lockId && meta.lockedAt) {
    const elapsed = Date.now() - new Date(meta.lockedAt).getTime();
    if (elapsed < 5 * 60 * 1000) { // 5 min stale threshold
      S.lockedBy = meta.lockedBy;
      showLockAlert(meta.lockedBy, elapsed);
      return;
    }
  }
  S.lockedBy = null;
  hideLockAlert();
}

function acquireLock() {
  S.data.meta.lockedBy = S.lockId;
  S.data.meta.lockedAt = new Date().toISOString();
  S.lockedBy = null;
  hideLockAlert();
  markDirty();
  saveFile();
  showToast('Lock acquired', 'success');
}

function releaseLock() {
  if (S.data.meta.lockedBy === S.lockId) {
    S.data.meta.lockedBy = null;
    S.data.meta.lockedAt = null;
  }
}

function showLockAlert(lockedBy, elapsed) {
  const el = document.getElementById('lock-alert');
  const text = document.getElementById('lock-alert-text');
  text.textContent = `File is currently locked by ${lockedBy} (${Math.floor(elapsed / 60000)}m ago). Changes may conflict.`;
  el.style.display = 'flex';
}

function hideLockAlert() { document.getElementById('lock-alert').style.display = 'none'; }

// ===================== APP LIFECYCLE =====================
function enterApp() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('header-filename').textContent = S.fileName;
  initLock();
  // if no lock, acquire
  if (!S.data.meta.lockedBy) {
    S.data.meta.lockedBy = S.lockId;
    S.data.meta.lockedAt = new Date().toISOString();
    markDirty();
  }
  render();
  if (!S.chatMessages.length) {
    S.chatMessages = [{ id: genId(), role: 'assistant', content: 'Hello! I\'m your FleetHub AI assistant. Ask me about your vehicles, bookings, or fleet management tips. Note: AI responses require configuring an API endpoint in Settings.', timestamp: new Date() }];
  }
  renderChat();
}

function closeApp() {
  releaseLock();
  saveFile();
  document.getElementById('app').classList.remove('active');
  document.getElementById('landing').style.display = 'flex';
  renderRecentFiles();
}

window.addEventListener('beforeunload', (e) => {

});

  const badge = document.getElementById('lock-badge');
  const text = document.getElementById('lock-badge-text');
  if (S.lockedBy && S.lockedBy !== S.lockId) {
    badge.className = 'lock-badge locked';
    text.textContent = 'Locked';
  } else {
    badge.className = 'lock-badge unlocked';
    text.textContent = 'Unlocked';
  }
}

function updateSaveIndicator() {
  const el = document.getElementById('save-indicator');
  if (S.saving) { el.className = 'save-indicator saving'; el.textContent = 'Saving...'; }
  else if (S.dirty) { el.className = 'save-indicator unsaved'; el.textContent = 'Unsaved changes'; }

}

function renderDashboard() {
  const vehicles = [...S.data.vehicles].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  const bookings = S.data.bookings;
  const now = new Date();
  const activeBookings = bookings.filter(isActive);
  const availableNow = vehicles.filter(v => !activeBookings.some(b => b.vehicleId === v.id && (b.status === 'confirmed' || b.status === 'in-use')));
  const todayBookings = bookings.filter(b => isToday(b.periodStart));
  const pendingCount = bookings.filter(b => b.status === 'pending').length;
  const activeUsers = new Set(activeBookings.map(b => b.userName)).size;
  const sharedCount = bookings.filter(b => b.shareWith && b.shareWith.length > 0).length;

  // Compact Calendar Widget (showing next 3 days)
  const widgetDays = 7;
  const widgetStartDate = new Date();
  widgetStartDate.setHours(0, 0, 0, 0);

  // Get German holidays for dashboard widget (include next year for year boundary)
  const widgetYear = widgetStartDate.getFullYear();
  const widgetEndDate = new Date(widgetStartDate);
  widgetEndDate.setDate(widgetEndDate.getDate() + widgetDays - 1);
  const widgetEndYear = widgetEndDate.getFullYear();
  const widgetYears = new Set([widgetYear, widgetEndYear]);
  const widgetHolidays = [...widgetYears].flatMap(y => getGermanHolidays(y, S.data.settings.germanState));
  const widgetHolidayMap = {};
  widgetHolidays.forEach(h => {
    widgetHolidayMap[h.date] = h;
  });

  const widgetDateCells = [];
  for (let i = 0; i < widgetDays; i++) {
    const date = new Date(widgetStartDate);
    date.setDate(date.getDate() + i);
    const isToday = date.toDateString() === now.toDateString();
    const dateStr = formatDateLocal(date);
    const holiday = widgetHolidayMap[dateStr];

    let bgStyle = '';
    let holidayClass = '';
    let holidayTitle = '';
    let holidayIcon = '';

    if (holiday) {
      if (holiday.isNationwide) {
        bgStyle = 'background:var(--warning-bg)!important;border-color:var(--warning-border)!important;';
        holidayClass = ' holiday-nationwide';
        holidayTitle = `data-tooltip="${escAttr(holiday.name)} (Nationwide holiday)"`;
      } else {
        bgStyle = 'background:#ffe4e6!important;border-color:#e8744f!important;';
        holidayClass = ' holiday-state';
        holidayTitle = `data-tooltip="${escAttr(holiday.name)} (State-specific holiday)"`;
      }
      holidayIcon = '<span style="margin-left:4px;font-size:9px;color:var(--muted)">🎉</span>';
    } else if (isToday) {
      bgStyle = 'background:var(--highlight-bg)!important;';
    }

    widgetDateCells.push(`<div class="gantt-date-cell${isToday ? ' today' : ''}${holidayClass}" style="${bgStyle}" ${holidayTitle}>${date.toLocaleDateString('en-US', {weekday:'short',month:'numeric',day:'numeric'})}${holidayIcon}</div>`);
  }

  const widgetViewEnd = new Date(widgetStartDate);
  widgetViewEnd.setDate(widgetViewEnd.getDate() + widgetDays);

  const widgetRows = vehicles.length ? vehicles.slice(0, 5).map(v => {
    const vehicleBookings = bookings.filter(b => {
      const bStart = new Date(b.periodStart);
      const bEnd = new Date(b.periodEnd);
      return b.vehicleId === v.id && b.status !== 'cancelled' && bEnd >= widgetStartDate && bStart <= widgetViewEnd;
    });

    // Pre-compute overlap slot assignments for visible bookings
    const sortedVB = [...vehicleBookings].sort((a, b) => new Date(a.periodStart) - new Date(b.periodStart));
    const slotAssignments = new Map();
    const slotEnds = [];
    for (const ob of sortedVB) {
      const oStart = new Date(ob.periodStart);
      const oEnd = new Date(ob.periodEnd);
      let slot = -1;
      for (let si = 0; si < slotEnds.length; si++) {
        if (slotEnds[si] <= oStart) { slot = si; slotEnds[si] = oEnd; break; }
      }
      if (slot === -1) { slot = slotEnds.length; slotEnds.push(oEnd); }
      slotAssignments.set(ob.id, slot);
    }

    const dayWidth = 120;
    const barHeight = 24;
    const barSpacing = 4;

    const bookingBars = vehicleBookings.map(b => {
      const bStart = new Date(b.periodStart);
      const bEnd = new Date(b.periodEnd);
      const clampedStart = new Date(Math.max(bStart, widgetStartDate));
      const clampedEnd = new Date(Math.min(bEnd, widgetViewEnd));
      if (clampedStart >= clampedEnd) return '';
      const startOffset = (clampedStart - widgetStartDate) / (1000 * 60 * 60);
      const duration = (clampedEnd - clampedStart) / (1000 * 60 * 60);
      const leftPos = startOffset * (dayWidth / 24);
      const width = Math.max(duration * (dayWidth / 24), 4);

      // Status color mapping for inline styles (ensures colors always render)
      const statusColors = {
        'pending': '#d9a441',
        'confirmed': '#254fad',
        'in-use': '#006400',
        'returned': '#41454d',
        'cancelled': '#b91c1c'
      };
      const barColor = statusColors[b.status] || '#d9a441';
      const overlapIndex = slotAssignments.get(b.id) || 0;
      const topOffset = 4 + overlapIndex * (barHeight + barSpacing);

      return `<div class="gantt-booking-bar ${esc(b.status)}"
        style="left:${leftPos}px;width:${width}px;height:${barHeight}px;top:${topOffset}px;background-color:${barColor}!important;color:#fff!important;font-size:11px;line-height:${barHeight}px;"
        data-tooltip="${escAttr(b.userName)} - ${escAttr(b.purpose)}"
        onclick="editBooking(this.dataset.id)"
        data-id="${escAttr(b.id)}"
      >${esc(b.userName)}</div>`;
    }).join('');

    const maxSlots = slotAssignments.size > 0 ? Math.max(...slotAssignments.values()) + 1 : 1;
    const rowHeight = maxSlots * (barHeight + barSpacing) + 8;

    return `<div class="gantt-row">
      <div class="gantt-row-label">${esc(v.name)}</div>
      <div class="gantt-timeline" style="min-height:${rowHeight}px;min-width:${widgetDays * 120}px">
        ${Array(widgetDays).fill(0).map((_, i) => {
          const date = new Date(widgetStartDate);
          date.setDate(date.getDate() + i);
          const isToday = date.toDateString() === now.toDateString();
          const dateStr = formatDateLocal(date);
          const holiday = widgetHolidayMap[dateStr];

          let bgStyle = '';
          let holidayClass = '';
          let titleAttr = '';
          if (holiday) {
            titleAttr = `data-tooltip="${escAttr(holiday.name)} (${holiday.isNationwide ? 'Nationwide' : 'State-specific'} holiday)"`;
            holidayClass = holiday.isNationwide ? ' holiday-nationwide' : ' holiday-state';
          } else if (isToday) {
            bgStyle = 'background:var(--highlight-bg)!important;';
          }

          return `<div class="gantt-time-cell${isToday ? ' today' : ''}${holidayClass}" style="left:${i * 120}px;width:120px;${bgStyle}" ${titleAttr}></div>`;
        }).join('')}
        ${bookingBars}
      </div>
    </div>`;
  }).join('') : '';

  const dashboardGanttHtml = widgetRows ? `<div class="card">
  <div class="card-header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
    Upcoming Schedule (Next 7 Days)
    <a style="margin-left:auto;font-size:13px;color:var(--primary);cursor:pointer" onclick="setTab('calendar')">View Full Calendar →</a>
  </div>
  <div class="card-body" style="padding:0">
    <div class="dashboard-gantt">
      <div class="gantt-header-row">
        <div class="gantt-corner-cell">Vehicle</div>
        <div class="gantt-date-cells">${widgetDateCells.join('')}</div>
      </div>
      <div class="gantt-rows">${widgetRows}</div>
    </div>
  </div>
</div>` : '';

  const fleetStatusHtml = vehicles.length ? vehicles.slice(0, 20).map(v => {

    const statusBadge = ab ? `<span class="badge badge-in-use">${esc(ab.userName)}</span>` : `<span class="badge badge-available">Available</span>`;
    const clickAttr = ab

      : ` data-vehicle-id="${escAttr(v.id)}" onclick="newBooking(this.dataset.vehicleId)" style="cursor:pointer"`;
    return `<div class="vehicle-status-row"${clickAttr}>
      <span class="v-name">${esc(v.name)}</span>
      ${v.licensePlate ? `<span class="v-plate">${esc(v.licensePlate)}</span>` : ''}
      <span style="margin-left:auto">${statusBadge}</span>
    </div>`;
  }).join('') : '<div class="empty-state"><p>No vehicles yet</p></div>';

  const upcoming = bookings.filter(b => new Date(b.periodStart) >= new Date()).sort((a, b) => new Date(a.periodStart) - new Date(b.periodStart)).slice(0, 5);
  const upcomingHtml = upcoming.length ? upcoming.map(b => {

        <div style="font-size:12px;color:var(--muted)">${esc(b.userName)}</div>

      ${b.shareWith && b.shareWith.length ? '<span class="badge badge-shared" style="margin-left:auto">Shared</span>' : ''}
    </div>`;
  }).join('') : '<div class="empty-state" style="padding:24px"><p>No upcoming bookings</p></div>';

  return `<div class="fade-in">
    <div class="tab-header"><h2>${TABS[0].icon} Dashboard</h2></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon" style="background:var(--primary)">${getFleetIconSvg(vehicles)}</div><div class="stat-value">${vehicles.length}</div><div class="stat-label">Total Vehicles</div></div>
      ${availableNow.length ? '<div class="stat-card"><div class="stat-icon" style="background:var(--success)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="stat-value">' + availableNow.length + '</div><div class="stat-label">Available Now</div></div>' : ''}
      ${todayBookings.length ? '<div class="stat-card"><div class="stat-icon" style="background:var(--link)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg></div><div class="stat-value">' + todayBookings.length + '</div><div class="stat-label">Today\'s Bookings</div></div>' : ''}
      ${pendingCount ? '<div class="stat-card"><div class="stat-icon" style="background:var(--mustard)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-value">' + pendingCount + '</div><div class="stat-label">Pending Approval</div></div>' : ''}
      ${activeUsers ? '<div class="stat-card"><div class="stat-icon" style="background:var(--forest)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="stat-value">' + activeUsers + '</div><div class="stat-label">Active Users</div></div>' : ''}
      ${sharedCount ? '<div class="stat-card"><div class="stat-icon" style="background:var(--coral)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="stat-value">' + sharedCount + '</div><div class="stat-label">Shared Rides</div></div>' : ''}
    </div>
    ${dashboardGanttHtml}
    <div class="two-col">
      <div class="card"><div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><path d="M14 10l-2-6"/><path d="M18 10h2"/></svg> Today's Fleet Status</div><div class="card-body">${fleetStatusHtml}</div></div>
      <div class="card"><div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg> Upcoming Bookings</div><div class="card-body">${upcomingHtml}</div></div>

// ===================== CALENDAR =====================
function renderCalendar() {
  const vehicles = [...S.data.vehicles].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  const bookings = S.data.bookings;
  const viewMode = S.calendarView || 'week';
  const daysToShow = viewMode === 'week' ? 7 : 30; // Mon-Sun for week view

  // Work hours: 6am to 8pm = 14 hours
  const workStartHour = 6;
  const workEndHour = 20;

  const startDate = new Date(S.calendarStart);
  startDate.setHours(0, 0, 0, 0); // Normalize to midnight
  const now = new Date();

  // Adjust start date to Monday if in week mode
  if (viewMode === 'week') {
    const dayOfWeek = startDate.getDay();
    const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    startDate.setDate(startDate.getDate() - daysToMonday);
  }

  // Get German holidays if configured (include next year for year boundary views)
  const currentYear = startDate.getFullYear();
  const viewEndDate = new Date(startDate);
  viewEndDate.setDate(viewEndDate.getDate() + daysToShow - 1);
  const endYear = viewEndDate.getFullYear();
  const yearsToFetch = new Set([currentYear, endYear]);
  const holidays = [...yearsToFetch].flatMap(y => getGermanHolidays(y, S.data.settings.germanState));
  const holidayMap = {};
  holidays.forEach(h => {
    holidayMap[h.date] = h;
  });

  // Generate date cells (Mon-Sun for week view)
  const dateCells = [];
  for (let i = 0; i < daysToShow; i++) {
    const date = new Date(startDate);
    date.setDate(date.getDate() + i);
    const isToday = date.toDateString() === now.toDateString();
    const dateStr = formatDateLocal(date);
    const holiday = holidayMap[dateStr];

    let bgStyle = '';
    let holidayClass = '';
    let holidayTitle = '';

    if (holiday) {
      if (holiday.isNationwide) {
        bgStyle = 'background:var(--warning-bg)!important;border-color:var(--warning-border)!important;';
        holidayClass = ' holiday-nationwide';
        holidayTitle = `data-tooltip="${escAttr(holiday.name)} (Nationwide holiday)"`;
      } else {
        bgStyle = 'background:#ffe4e6!important;border-color:#e8744f!important;';
        holidayClass = ' holiday-state';
        holidayTitle = `data-tooltip="${escAttr(holiday.name)} (State-specific holiday)"`;
      }
    } else if (isToday) {
      bgStyle = 'background:var(--highlight-bg)!important;';
    }

    dateCells.push({
      date: date,
      html: `<div class="gantt-date-cell${isToday ? ' today' : ''}${holidayClass}" style="${bgStyle}" ${holidayTitle}>${date.toLocaleDateString('en-US', {weekday:'short',month:'numeric',day:'numeric'})}${holiday ? `<span style="margin-left:4px;font-size:9px;color:var(--muted)">🎉</span>` : ''}</div>`,
      holiday: holiday
    });
  }

  const dayWidth = 120; // pixels per work day
  const hourWidth = dayWidth / (workEndHour - workStartHour);

  // Helper: map a date to x-position on the Gantt timeline
  const firstVisibleDate = new Date(dateCells[0].date);
  firstVisibleDate.setHours(0, 0, 0, 0); // Normalize to midnight
  const msPerDay = 86400000;
  function ganttX(date) {
    const dateMidnight = new Date(date);
    dateMidnight.setHours(0, 0, 0, 0);
    const dayOffset = Math.round((dateMidnight.getTime() - firstVisibleDate.getTime()) / msPerDay);
    const hour = date.getHours() + date.getMinutes() / 60;
    return dayOffset * dayWidth + Math.max(0, Math.min(workEndHour - workStartHour, hour - workStartHour)) * hourWidth;
  }

  const lastVisibleEnd = new Date(dateCells[dateCells.length - 1].date);
  lastVisibleEnd.setDate(lastVisibleEnd.getDate() + 1);

  // Generate vehicle rows with booking bars
  const vehicleRows = vehicles.length ? vehicles.map(v => {
    const vehicleBookings = bookings.filter(b => b.vehicleId === v.id && b.status !== 'cancelled');

    // Clamp to visible range for slot assignment and rendering
    const visibleBookings = vehicleBookings.filter(b => {
      const bs = new Date(b.periodStart);
      const be = new Date(b.periodEnd);
      return be > firstVisibleDate && bs < lastVisibleEnd;
    });

    // Pre-compute overlap slot assignments for visible bookings only
    const sortedVB = [...visibleBookings].sort((a, b) => new Date(a.periodStart) - new Date(b.periodStart));
    const slotAssignments = new Map();
    const slotEnds = [];
    for (const ob of sortedVB) {
      const oStart = new Date(ob.periodStart);
      const oEnd = new Date(ob.periodEnd);
      let slot = -1;
      for (let si = 0; si < slotEnds.length; si++) {
        if (slotEnds[si] <= oStart) { slot = si; slotEnds[si] = oEnd; break; }
      }
      if (slot === -1) { slot = slotEnds.length; slotEnds.push(oEnd); }
      slotAssignments.set(ob.id, slot);
    }

    const bookingBars = visibleBookings.map(b => {
      const bStart = new Date(b.periodStart);
      const bEnd = new Date(b.periodEnd);

      // Clamp booking to visible range (supports bookings starting before or ending after)
      const cStart = new Date(Math.max(bStart.getTime(), firstVisibleDate.getTime()));
      const cEnd = new Date(Math.min(bEnd.getTime(), lastVisibleEnd.getTime()));

      if (cStart >= cEnd) return ''; // Booking entirely outside visible range

      const leftOffset = ganttX(cStart);
      const rightOffset = ganttX(cEnd);
      const barWidth = Math.max(rightOffset - leftOffset, 4);

      const overlapIndex = slotAssignments.get(b.id) || 0;
      const topOffset = overlapIndex * 64; // 60px bar height + 4px spacing

      // Status color mapping for inline styles (ensures colors always render)
      const statusColors = {
        'pending': '#d9a441',
        'confirmed': '#254fad',
        'in-use': '#006400',
        'returned': '#41454d',
        'cancelled': '#b91c1c'
      };
      const barColor = statusColors[b.status] || '#d9a441';

      return `<div class="gantt-booking-bar ${esc(b.status)}"
        style="left:${leftOffset}px;width:${Math.max(barWidth, 4)}px;top:${topOffset}px;background-color:${barColor}!important;color:#fff!important;"
        data-tooltip="${escAttr(b.userName)} - ${escAttr(b.purpose)} (${fmtDateTime(b.periodStart)} to ${fmtDateTime(b.periodEnd)})"
        onclick="editBooking(this.dataset.id)"
        data-id="${escAttr(b.id)}"
      >${esc(b.userName)}</div>`;
    }).join('');

    // Calculate max overlap slots for this vehicle to set row height
    const maxSlots = slotAssignments.size > 0 ? Math.max(...slotAssignments.values()) + 1 : 1;
    const rowHeight = maxSlots * 64;

    return `<div class="gantt-row">
      <div class="gantt-row-label">${esc(v.name)}</div>
      <div class="gantt-timeline" style="min-width:${dateCells.length * dayWidth}px;min-height:${rowHeight}px">
        <!-- Grid lines for each work day -->
        ${dateCells.map((cell, i) => {
          const isToday = cell.date.toDateString() === now.toDateString();
          let bgStyle = '';
          let holidayClass = '';
          let titleAttr = '';
          if (cell.holiday) {
            titleAttr = `data-tooltip="${escAttr(cell.holiday.name)} (${cell.holiday.isNationwide ? 'Nationwide' : 'State-specific'} holiday)"`;
            holidayClass = cell.holiday.isNationwide ? ' holiday-nationwide' : ' holiday-state';
          } else if (isToday) {
            bgStyle = 'background:var(--highlight-bg)!important;';
          }
          return `<div class="gantt-time-cell${isToday ? ' today' : ''}${holidayClass}" style="left:${i * dayWidth}px;width:${dayWidth}px;${bgStyle}" ${titleAttr}></div>`;
        }).join('')}
        ${bookingBars}
      </div>
    </div>`;
  }).join('') : '<div class="empty-state"><p>No vehicles to display</p></div>';

  return `<div class="fade-in">
    <div class="tab-header">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg> Schedule Calendar (${viewMode === 'week' ? 'Mon-Sun, 6am-8pm' : 'Month'})</h2>
      <div class="tab-header-actions">
        <div class="gantt-nav-controls">
          <button class="btn btn-sm" onclick="navigateCalendar(-1)">← Prev</button>
          <button class="btn btn-sm" onclick="goToToday()">Today</button>
          <button class="btn btn-sm" onclick="navigateCalendar(1)">Next →</button>
        </div>
        <div class="gantt-view-toggle">
          <button class="btn btn-sm ${viewMode === 'week' ? 'btn-primary' : ''}" onclick="setCalendarView('week')">Week</button>
          <button class="btn btn-sm ${viewMode === 'month' ? 'btn-primary' : ''}" onclick="setCalendarView('month')">Month</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:0">
        <div class="gantt-container">
          <div class="gantt-header-row">
            <div class="gantt-corner-cell">Vehicle</div>
            <div class="gantt-date-cells">${dateCells.map(c => c.html).join('')}</div>
          </div>
          <div class="gantt-rows">${vehicleRows}</div>
        </div>
      </div>
    </div>
  </div>`;
}

// ===================== VEHICLES =====================
function renderVehicles() {
