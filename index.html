  const rows = vehicles.length ? vehicles.map((v, idx) => {
    const isFirst = idx === 0;
    const isLast = idx === vehicles.length - 1;
    return `<tr style="cursor:pointer" onclick="editVehicle('${v.id}')">
      <td style="font-weight:500;color:var(--ink)">${esc(v.name)}</td>
      <td>${esc(v.type)}</td>
      <td>${esc(v.licensePlate || '—')}</td>
      <td style="color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.notes || '')}</td>
      <td style="white-space:nowrap">
        <button class="btn-icon btn-sm" onclick="event.stopPropagation();moveVehicleUp(${idx})" data-tooltip="Move up" ${isFirst ? 'disabled' : ''}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg></button>
        <button class="btn-icon btn-sm" onclick="event.stopPropagation();moveVehicleDown(${idx})" data-tooltip="Move down" ${isLast ? 'disabled' : ''}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
        <button class="btn-icon btn-sm" onclick="event.stopPropagation();confirmDeleteVehicle('${v.id}')" data-tooltip="Delete" style="color:var(--destructive)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
      </td>
    </tr>`;
  }).join('') : '';

  return `<div class="fade-in">
    <div class="tab-header"><h2>${TABS[2].icon} Vehicles</h2>
      <div class="tab-header-actions">
        <button class="btn btn-primary btn-sm" onclick="editVehicle(null)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          Add Vehicle
        </button>
      </div>
    </div>
    ${vehicles.length ? `<div class="card"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Type</th><th>License Plate</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div></div>` :
      `<div class="card"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><h3>No vehicles yet</h3><p>Add your first vehicle to get started.</p></div></div>`}
  </div>`;
}

function editVehicle(id) {
  const v = id ? S.data.vehicles.find(v => v.id === id) : null;
  S.editingVehicle = v;
  const isEdit = !!v;
  const types = S.data.settings.vehicleTypes || DEFAULT_SETTINGS.vehicleTypes;
  const typeOptions = types.map(t => `<option value="${esc(t)}"${v && v.type === t ? ' selected' : ''}>${esc(t)}</option>`).join('');
  const statuses = ['available', 'in-use', 'maintenance', 'reserved'];

  openDialog(isEdit ? 'Edit Vehicle' : 'Add Vehicle', `
    <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="v-name" value="${esc(v ? v.name : '')}" placeholder="e.g. Toyota Hilux #1"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Type</label><select class="form-input" id="v-type">${typeOptions}</select></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-input" id="v-status">${statuses.map(s => `<option value="${s}"${v && v.status === s ? ' selected' : ''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label class="form-label">License Plate</label><input class="form-input" id="v-plate" value="${esc(v ? v.licensePlate || '' : '')}" placeholder="ABC-1234"></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="v-notes" rows="2" placeholder="Optional notes...">${esc(v ? v.notes || '' : '')}</textarea></div>
  `, () => {
    const name = document.getElementById('v-name').value.trim();
    if (!name) { showToast('Vehicle name is required', 'error'); return false; }
    const data = {
      name,
      type: document.getElementById('v-type').value,
      status: document.getElementById('v-status').value,
      licensePlate: document.getElementById('v-plate').value.trim() || null,
      notes: document.getElementById('v-notes').value.trim() || null,
      updatedAt: new Date().toISOString()
    };
    if (isEdit) {
      Object.assign(v, data);
      showToast('Vehicle updated', 'success');
    } else {
      S.data.vehicles.push({ id: genId(), ...data, sortOrder: S.data.vehicles.length, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      showToast('Vehicle added', 'success');
    }
    markDirty(); render(); return true;
  });
}

function moveVehicleUp(idx) {
  if (idx <= 0) return;
  const vehicles = [...S.data.vehicles].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  vehicles.forEach((v, i) => { v.sortOrder = i; });
  const currentVehicle = vehicles[idx];
  const prevVehicle = vehicles[idx - 1];
  const tempOrder = currentVehicle.sortOrder;
  currentVehicle.sortOrder = prevVehicle.sortOrder;
  prevVehicle.sortOrder = tempOrder;
  markDirty(); render();
}

function moveVehicleDown(idx) {
  const vehicles = [...S.data.vehicles].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  if (idx >= vehicles.length - 1) return;
  vehicles.forEach((v, i) => { v.sortOrder = i; });
  const currentVehicle = vehicles[idx];
  const nextVehicle = vehicles[idx + 1];
  const tempOrder = currentVehicle.sortOrder;
  currentVehicle.sortOrder = nextVehicle.sortOrder;
  nextVehicle.sortOrder = tempOrder;
  markDirty(); render();
}

function confirmDeleteVehicle(id) {
  const v = S.data.vehicles.find(v => v.id === id);
  const bookingCount = S.data.bookings.filter(b => b.vehicleId === id).length;
  openDialog('Delete Vehicle', `
    <p>Are you sure you want to delete <strong>${esc(v.name)}</strong>?</p>
    ${bookingCount ? `<p style="color:var(--warning);margin-top:8px;font-size:13px">This will also delete ${bookingCount} associated booking(s).</p>` : ''}
  `, () => {
    S.data.vehicles = S.data.vehicles.filter(v => v.id !== id);
    S.data.bookings = S.data.bookings.filter(b => b.vehicleId !== id);
    markDirty(); render(); showToast('Vehicle deleted', 'success'); return true;
  }, true);
}

// ===================== BOOKINGS =====================
function renderBookings() {
  const vehicles = S.data.vehicles;
  const allBookings = S.data.bookings.sort((a, b) => new Date(b.periodStart) - new Date(a.periodStart));

  // Filter
  let filtered = allBookings;
  if (S.bookingSearch) {
    const q = S.bookingSearch.toLowerCase();
    filtered = filtered.filter(b => {
      const v = vehicles.find(v => v.id === b.vehicleId);
      return (v && v.name.toLowerCase().includes(q)) || b.userName.toLowerCase().includes(q) || b.purpose.toLowerCase().includes(q) || (b.remarks || '').toLowerCase().includes(q);
    });
  }
  if (S.bookingVehicleFilter) filtered = filtered.filter(b => b.vehicleId === S.bookingVehicleFilter);
  if (S.bookingStatusFilter) filtered = filtered.filter(b => b.status === S.bookingStatusFilter);

  // Pagination
  const totalPages = Math.max(1, Math.ceil(filtered.length / S.pageSize));
  if (S.bookingPage > totalPages) S.bookingPage = totalPages;
  const start = (S.bookingPage - 1) * S.pageSize;
  const pageItems = filtered.slice(start, start + S.pageSize);
  const statuses = S.data.settings.statuses || DEFAULT_SETTINGS.statuses;

  const vehicleOptions = vehicles.map(v => `<option value="${v.id}"${S.bookingVehicleFilter === v.id ? ' selected' : ''}>${esc(v.name)}</option>`).join('');
  const statusOptions = statuses.map(s => `<option value="${s}"${S.bookingStatusFilter === s ? ' selected' : ''}>${s}</option>`).join('');
  const customCols = S.data.settings.customColumns || [];

  const conflictWarning = S.editingBooking ? renderConflictWarning(S.editingBooking) : '';

  const rows = pageItems.map(b => {
    const v = vehicles.find(v => v.id === b.vehicleId);
    const shareCount = (b.shareWith || []).length;
    const cfHtml = customCols.map(col => {
      const val = (b.customFields || {})[col.key];
      if (Array.isArray(val)) return `<td style="font-size:13px">${val.length ? esc(val.join(', ')) : '—'}</td>`;
      return `<td style="font-size:13px">${esc(val != null ? String(val) : '—')}</td>`;
    }).join('');
    return `<tr style="cursor:pointer" onclick="editBooking(this.dataset.id)" data-id="${escAttr(b.id)}">
      <td style="font-weight:500;color:var(--ink)">${esc(v ? v.name : 'Unknown')}</td>
      <td>${esc(b.userName)}</td>
      <td>${esc(b.purpose)}</td>
      <td style="white-space:nowrap;font-size:13px">${fmtDate(b.periodStart)}<br>${fmtDate(b.periodEnd)}</td>
      <td><span class="badge badge-${esc(b.status)}">${esc(b.status)}</span></td>
      ${cfHtml}
      <td>${shareCount ? `<span class="badge badge-shared" style="cursor:pointer" onclick="event.stopPropagation();openShareDialog('${b.id}')">${shareCount}</span>` : '—'}</td>
      <td style="white-space:nowrap;font-size:12px;color:var(--muted)">${fmtDateTime(b.createdAt)}</td>
      <td style="white-space:nowrap;font-size:12px;color:var(--muted)">${fmtDateTime(b.updatedAt)}</td>
      <td style="white-space:nowrap">
        <button class="btn-icon btn-sm" onclick="event.stopPropagation();confirmDeleteBooking(this.dataset.id)" data-tooltip="Delete" data-id="${escAttr(b.id)}" style="color:var(--destructive)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
      </td>
    </tr>`;
  }).join('');

  return `<div class="fade-in">
    <div class="tab-header"><h2>${TABS[1].icon} Bookings</h2></div>
    ${conflictWarning}
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <div class="search-bar" style="flex:1;min-width:200px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Search bookings..." value="${esc(S.bookingSearch)}" oninput="S.bookingSearch=this.value;S.bookingPage=1;render()">
      </div>
      <div class="filters">
        <select onchange="S.bookingVehicleFilter=this.value;S.bookingPage=1;render()"><option value="">All Vehicles</option>${vehicleOptions}</select>
        <select onchange="S.bookingStatusFilter=this.value;S.bookingPage=1;render()"><option value="">All Statuses</option>${statusOptions}</select>
      </div>
    </div>
    ${pageItems.length ? `<div class="card"><div class="table-wrap"><table><thead><tr><th>Vehicle</th><th>User</th><th>Purpose</th><th>Period</th><th>Status</th>${customCols.map(c => `<th>${esc(c.label)}</th>`).join('')}<th>Share</th><th>Created</th><th>Updated</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>
      <div class="pagination" style="padding:8px 12px">
        <span>Showing ${start + 1}–${Math.min(start + S.pageSize, filtered.length)} of ${filtered.length}</span>
        <div style="display:flex;gap:4px">
          <button ${S.bookingPage <= 1 ? 'disabled' : ''} onclick="S.bookingPage--;render()">Prev</button>
          <span style="padding:4px 8px;font-size:13px">${S.bookingPage} / ${totalPages}</span>
          <button ${S.bookingPage >= totalPages ? 'disabled' : ''} onclick="S.bookingPage++;render()">Next</button>
        </div>
      </div>
    </div>` :
      `<div class="card"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg><h3>No bookings yet</h3><p>Create your first booking to get started.</p></div></div>`}
  </div>`;
}

function renderConflictWarning(booking) {
  if (!booking.vehicleId || !booking.periodStart || !booking.periodEnd) return '';
  const conflicts = S.data.bookings.filter(b => {
    if (b.id === booking.id) return false;
    if (b.vehicleId !== booking.vehicleId) return false;
    if (b.status === 'cancelled') return false;
    const bs = new Date(b.periodStart), be = new Date(b.periodEnd);
    const ns = new Date(booking.periodStart), ne = new Date(booking.periodEnd);
    return ns < be && ne > bs;
  });
  if (!conflicts.length) return '';
  return `<div style="padding:10px 14px;background:var(--warning-bg);border:1px solid var(--warning-border);border-radius:var(--radius-sm);margin-bottom:16px;font-size:13px;color:var(--warning);display:flex;align-items:center;gap:8px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    Schedule conflict with ${conflicts.map(c => c.userName).join(', ')}.
    <button class="btn btn-sm" onclick="shareWithConflicts()" style="margin-left:auto">Share Ride</button>
  </div>`;
}

function shareWithConflicts() {
  if (!S.editingBooking) return;
  const conflicts = S.data.bookings.filter(b => {
    if (b.id === S.editingBooking.id) return false;
    if (b.vehicleId !== S.editingBooking.vehicleId) return false;
    if (b.status === 'cancelled') return false;
    const bs = new Date(b.periodStart), be = new Date(b.periodEnd);
    const ns = new Date(S.editingBooking.periodStart), ne = new Date(S.editingBooking.periodEnd);
    return ns < be && ne > bs;
  });
  const existing = S.editingBooking.shareWith || [];
  conflicts.forEach(c => { if (!existing.includes(c.userName)) existing.push(c.userName); });
  S.editingBooking.shareWith = existing;
  S.editingBooking.shareNote = S.data.settings.shareMessage || DEFAULT_SETTINGS.shareMessage;
  // Re-render dialog if open
  showToast('Added conflicting users to share list', 'info');
}

function newBooking(preselectedVehicleId) { editBooking(null, preselectedVehicleId); }

function renderUserNameField(value) {
  const userNameConfig = S.data.settings.userNameConfig || { type: 'text', options: [] };

  if (userNameConfig.type === 'select') {
    const options = (userNameConfig.options || []).map(o => `<option value="${escAttr(o)}"${value === o ? ' selected' : ''}>${esc(o)}</option>`).join('');
    return `<div class="form-group"><label class="form-label">User Name *</label><select class="form-input" id="b-user"><option value="">Select user...</option>${options}</select></div>`;
  } else if (userNameConfig.type === 'multiselect') {
    const selectedValues = Array.isArray(value) ? value : (value ? String(value).split(',').map(v => v.trim()) : []);
    const options = (userNameConfig.options || []).map(o => {
      const checked = selectedValues.includes(o) ? ' checked' : '';
      return '<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" class="un-select-field" value="' + escAttr(o) + '"' + checked + '> ' + esc(o) + '</label>';
    }).join('');
    return `<div class="form-group"><label class="form-label">User Name *</label>
      <input type="hidden" id="b-user" value="${escAttr(value || '')}">
      <div style="display:flex;flex-wrap:wrap;gap:8px">${options}</div>
    </div>`;
  } else {
    return `<div class="form-group"><label class="form-label">User Name *</label><input class="form-input" id="b-user" value="${escAttr(value)}" placeholder="Who is booking?"></div>`;
  }
}

function editBooking(id, preselectedVehicleId) {
  const b = id ? S.data.bookings.find(b => b.id === id) : null;
  S.editingBooking = b ? JSON.parse(JSON.stringify(b)) : { id: null, vehicleId: preselectedVehicleId || '', userName: '', purpose: '', periodStart: '', periodEnd: '', status: S.data.settings.statuses[0] || 'pending', remarks: '', customFields: {}, shareWith: [], shareNote: '' };
  const vehicles = [...S.data.vehicles].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  const statuses = S.data.settings.statuses || DEFAULT_SETTINGS.statuses;
  const customCols = S.data.settings.customColumns || [];
  const eb = S.editingBooking;

  const vehicleOptions = vehicles.map(v => `<option value="${v.id}"${eb.vehicleId === v.id ? ' selected' : ''}>${esc(v.name)}</option>`).join('');
  const statusOptions = statuses.map(s => `<option value="${s}"${eb.status === s ? ' selected' : ''}>${s}</option>`).join('');
  const shareTags = (eb.shareWith || []).map(name => `<span class="share-tag">${esc(name)}<button data-name="${escAttr(name)}" onclick="removeShareName(this,this.dataset.name)">×</button></span>`).join('');
  const customFieldsHtml = customCols.map(col => {
    const val = (eb.customFields || {})[col.key] ?? '';
    if (col.type === 'select') return `<div class="form-group"><label class="form-label">${esc(col.label)}</label><select class="form-input cf-field" data-key="${escAttr(col.key)}">${(col.options || []).map(o => `<option value="${escAttr(o)}"${val === o ? ' selected' : ''}>${esc(o)}</option>`).join('')}</select></div>`;
    if (col.type === 'multiselect') {
      const selectedValues = Array.isArray(val) ? val : (val ? String(val).split(',').map(v => v.trim()).filter(Boolean) : []);
      return `<div class="form-group"><label class="form-label">${esc(col.label)}</label><div style="display:flex;flex-wrap:wrap;gap:8px">${(col.options || []).map(o => `<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" class="cf-field" data-key="${escAttr(col.key)}" value="${escAttr(o)}"${selectedValues.includes(o) ? ' checked' : ''}> ${esc(o)}</label>`).join('')}</div></div>`;
    }
    if (col.type === 'number') return `<div class="form-group"><label class="form-label">${esc(col.label)}</label><input class="form-input cf-field" type="number" data-key="${escAttr(col.key)}" value="${escAttr(val !== '' ? String(val) : '')}"></div>`;
    if (col.type === 'date') return `<div class="form-group"><label class="form-label">${esc(col.label)}</label><input class="form-input cf-field" type="date" data-key="${escAttr(col.key)}" value="${escAttr(val !== '' ? String(val) : '')}"></div>`;
    return `<div class="form-group"><label class="form-label">${esc(col.label)}</label><input class="form-input cf-field" data-key="${escAttr(col.key)}" value="${escAttr(val !== '' ? String(val) : '')}"></div>`;
  }).join('');

  openDialog(b ? 'Edit Booking' : 'New Booking', `
    <div id="conflict-warning"></div>
    <div class="form-group"><label class="form-label">Vehicle *</label><select class="form-input" id="b-vehicle" onchange="checkConflicts()"><option value="">Select vehicle...</option>${vehicleOptions}</select></div>
    ${renderUserNameField(eb.userName)}
    <div class="form-group"><label class="form-label">Purpose *</label><input class="form-input" id="b-purpose" value="${esc(eb.purpose)}" placeholder="e.g. Client meeting"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start *</label><input class="form-input" id="b-start" type="datetime-local" value="${eb.periodStart ? eb.periodStart.slice(0, 16) : ''}" onchange="checkConflicts()"></div>
      <div class="form-group"><label class="form-label">End *</label><input class="form-input" id="b-end" type="datetime-local" value="${eb.periodEnd ? eb.periodEnd.slice(0, 16) : ''}" onchange="checkConflicts()"></div>
    </div>
    <div class="form-group"><label class="form-label">Status</label><select class="form-input" id="b-status">${statusOptions}</select></div>
    <div class="form-group"><label class="form-label">Remarks</label><textarea class="form-input" id="b-remarks" rows="2" placeholder="Optional remarks...">${esc(eb.remarks || '')}</textarea></div>
    ${customFieldsHtml}
    <div class="share-panel">
      <h4><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Share / Carpool</h4>
      <div class="share-tags" id="share-tags">${shareTags || '<span style="font-size:13px;color:var(--muted)">No co-passengers</span>'}</div>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="share-input" placeholder="Add co-passenger name" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addShareName()}">
        <button class="btn btn-sm" onclick="addShareName()">Add</button>
      </div>
      <div class="form-group" style="margin-top:8px;margin-bottom:0"><label class="form-label">Share Note</label><textarea class="form-input" id="share-note" rows="2" placeholder="Optional note for co-passengers...">${esc(eb.shareNote || '')}</textarea></div>
    </div>
  `, () => {
    if (b) setTimeout(checkConflicts, 0);
    const vehicleId = document.getElementById('b-vehicle').value;
    // Handle userName - could be text, select, or multiselect
    const userNameConfig = S.data.settings.userNameConfig || { type: 'text' };
    let userName = '';
    if (userNameConfig.type === 'multiselect') {
      const selected = Array.from(document.querySelectorAll('.un-select-field:checked')).map(el => el.value);
      userName = selected.join(', ');
      document.getElementById('b-user').value = userName;
    } else {
      userName = document.getElementById('b-user').value.trim();
    }
    const purpose = document.getElementById('b-purpose').value.trim();
    const periodStart = document.getElementById('b-start').value;
    const periodEnd = document.getElementById('b-end').value;
    if (!vehicleId || !userName || !purpose || !periodStart || !periodEnd) { showToast('Please fill all required fields', 'error'); return false; }

    const customFields = {};
    document.querySelectorAll('.cf-field').forEach(el => {
      if (el.type === 'checkbox') {
        if (!customFields[el.dataset.key]) customFields[el.dataset.key] = [];
        if (el.checked) customFields[el.dataset.key].push(el.value);
      } else {
        customFields[el.dataset.key] = el.value;
      }
    });

    const data = {
      vehicleId, userName, purpose,
      periodStart: new Date(periodStart).toISOString(),
      periodEnd: new Date(periodEnd).toISOString(),
      status: document.getElementById('b-status').value,
      remarks: document.getElementById('b-remarks').value.trim() || null,
      customFields,
      shareWith: [...(S.editingBooking.shareWith || [])],
      shareNote: document.getElementById('share-note').value.trim() || null,
      updatedAt: new Date().toISOString()
    };

    if (b) {
      Object.assign(b, data);
      showToast('Booking updated', 'success');
    } else {
      S.data.bookings.push({ id: genId(), ...data, createdAt: new Date().toISOString() });
      showToast('Booking created', 'success');
    }
    S.editingBooking = null;
    markDirty(); render(); return true;
  });
}

function checkConflicts() {
  if (!S.editingBooking) return;
  S.editingBooking.vehicleId = document.getElementById('b-vehicle')?.value || '';
  S.editingBooking.periodStart = document.getElementById('b-start')?.value || '';
  S.editingBooking.periodEnd = document.getElementById('b-end')?.value || '';
  const warningEl = document.getElementById('conflict-warning');
  if (warningEl) warningEl.innerHTML = renderConflictWarning(S.editingBooking);
}

function addShareName() {
  const input = document.getElementById('share-input');
  const name = input.value.trim();
  if (!name || !S.editingBooking) return;
  if (!S.editingBooking.shareWith) S.editingBooking.shareWith = [];
  if (!S.editingBooking.shareWith.includes(name)) {
    S.editingBooking.shareWith.push(name);
    renderShareTags();
  }
  input.value = '';
}

function removeShareName(btn, name) {
  if (!S.editingBooking) return;
  S.editingBooking.shareWith = (S.editingBooking.shareWith || []).filter(n => n !== name);
  renderShareTags();
}

function renderShareTags() {
  const el = document.getElementById('share-tags');
  if (!el || !S.editingBooking) return;
  const tags = (S.editingBooking.shareWith || []).map(name => `<span class="share-tag">${esc(name)}<button data-name="${escAttr(name)}" onclick="removeShareName(this,this.dataset.name)">×</button></span>`).join('');
  el.innerHTML = tags || '<span style="font-size:13px;color:var(--muted)">No co-passengers</span>';
}

function openShareDialog(id) {
  const b = S.data.bookings.find(b => b.id === id);
  if (b) editBooking(id);
}

function confirmDeleteBooking(id) {
  const b = S.data.bookings.find(b => b.id === id);
  openDialog('Delete Booking', `<p>Are you sure you want to delete the booking by <strong>${esc(b.userName)}</strong> for <strong>${esc(b.purpose)}</strong>?</p>`, () => {
    S.data.bookings = S.data.bookings.filter(b => b.id !== id);
    markDirty(); render(); showToast('Booking deleted', 'success'); return true;
  }, true);
}

// ===================== SETTINGS =====================

function addSettingItem(key) {
  const input = document.getElementById('settings-input');
  const val = input.value.trim();
  if (!val) return;
  if (!S.data.settings[key]) S.data.settings[key] = [];
  if (!S.data.settings[key].includes(val)) {
    S.data.settings[key].push(val);
    markDirty(); render(); showToast(`Added "${val}"`, 'success');
  }
}

function removeSettingItem(key, val) {
  S.data.settings[key] = (S.data.settings[key] || []).filter(v => v !== val);
  markDirty(); render(); showToast(`Removed "${val}"`, 'success');
}

function saveGermanState() {
  const state = document.getElementById('german-state').value;
  S.data.settings.germanState = state || null;
  markDirty(); render(); showToast(`German state updated`, 'success');
}

function toggleCfOptions() {
  const type = document.getElementById('cf-type').value;
  const optionsGroup = document.getElementById('cf-options-group');
  if (optionsGroup) {
    optionsGroup.style.display = (type === 'select' || type === 'multiselect') ? 'block' : 'none';
  }
}

function editUserNameConfig() {
  const config = S.data.settings.userNameConfig || { type: 'text', options: [] };
  const dialogHtml = `
    <div class="form-group"><label class="form-label">User Name Field Type</label>
    <select class="form-input" id="un-type" onchange="toggleUnOptions()">
      <option value="text" ${config.type === 'text' ? 'selected' : ''}>Text</option>
      <option value="select" ${config.type === 'select' ? 'selected' : ''}>Select (single)</option>
      <option value="multiselect" ${config.type === 'multiselect' ? 'selected' : ''}>Multi-select</option>
    </select></div>
    <div class="form-group" id="un-options-group" style="margin-top:12px;display:${config.type === 'text' ? 'none' : 'block'}">
      <label class="form-label">Known User Names (comma-separated)</label>
      <input class="form-input" id="un-options" placeholder="John Doe, Jane Smith, Bob Wilson" value="${escAttr((config.options || []).join(', '))}">
      <div class="form-hint">These options will be available when creating bookings</div>
    </div>
  `;

  openDialog('Configure User Name Field', dialogHtml, () => {
    const type = document.getElementById('un-type').value;
    const optionsStr = document.getElementById('un-options').value;
    const options = optionsStr.split(',').map(o => o.trim()).filter(Boolean);

    if ((type === 'select' || type === 'multiselect') && !options.length) { showToast('At least one option is required for select/multiselect types', 'error'); return false; }
    S.data.settings.userNameConfig = { type, options: options.length ? options : undefined };
    markDirty(); render(); showToast('User Name field configured', 'success');
    return true;
  });

  toggleUnOptions();
}

function toggleUnOptions() {
  const type = document.getElementById('un-type').value;
  const optionsGroup = document.getElementById('un-options-group');
  if (optionsGroup) {
    optionsGroup.style.display = type === 'text' ? 'none' : 'block';
  }
}

function addCustomField() {
  const label = document.getElementById('cf-label').value.trim();
  const key = document.getElementById('cf-key').value.trim().replace(/[^a-zA-Z0-9_]/g, '');
  const type = document.getElementById('cf-type').value;
  const options = document.getElementById('cf-options').value.split(',').map(o => o.trim()).filter(Boolean);
  if (!label || !key) { showToast('Label and Key are required', 'error'); return; }
  if (!S.data.settings.customColumns) S.data.settings.customColumns = [];
  if (S.data.settings.customColumns.some(c => c.key === key)) { showToast(`A custom field with key "${key}" already exists`, 'error'); return; }
  if ((type === 'select' || type === 'multiselect') && !options.length) { showToast('At least one option is required for select/multiselect types', 'error'); return; }
  const optionsField = (type === 'select' || type === 'multiselect') ? options : undefined;
  S.data.settings.customColumns.push({ id: genId(), key, label, type, options: optionsField });
  document.getElementById('cf-label').value = '';
  document.getElementById('cf-key').value = '';
  document.getElementById('cf-type').value = 'text';
  document.getElementById('cf-options').value = '';
  toggleCfOptions();
  markDirty(); render(); showToast('Custom field added', 'success');
}

function removeCustomField(key) {
  S.data.settings.customColumns = (S.data.settings.customColumns || []).filter(c => c.key !== key);
  markDirty(); render(); showToast('Custom field removed', 'success');
}

let editingCustomFieldKey = null;

function editCustomField(key) {
  const col = S.data.settings.customColumns.find(c => c.key === key);
  if (!col) return;
  editingCustomFieldKey = key;
  document.getElementById('cf-label').value = col.label;
  document.getElementById('cf-key').value = col.key;
  document.getElementById('cf-key').disabled = true;
  document.getElementById('cf-type').value = col.type;
  document.getElementById('cf-options').value = (col.options || []).join(', ');
  document.getElementById('cf-submit-btn').textContent = 'Update Field';
  document.getElementById('cf-submit-btn').onclick = updateCustomField;
  document.getElementById('cf-cancel-btn').style.display = 'inline-block';
  toggleCfOptions();
}

function updateCustomField() {
  if (!editingCustomFieldKey) return;
  const label = document.getElementById('cf-label').value.trim();
  const newKey = document.getElementById('cf-key').value.trim().replace(/[^a-zA-Z0-9_]/g, '');
  const type = document.getElementById('cf-type').value;
  const options = document.getElementById('cf-options').value.split(',').map(o => o.trim()).filter(Boolean);
  if (!label || !newKey) { showToast('Label and Key are required', 'error'); return; }
  if ((type === 'select' || type === 'multiselect') && !options.length) { showToast('At least one option is required for select/multiselect types', 'error'); return; }
  const optionsField = (type === 'select' || type === 'multiselect') ? options : undefined;
  const idx = S.data.settings.customColumns.findIndex(c => c.key === editingCustomFieldKey);
  if (idx !== -1) {
    S.data.settings.customColumns[idx] = { ...S.data.settings.customColumns[idx], key: newKey, label, type, options: optionsField };
    markDirty(); render(); showToast('Custom field updated', 'success');
  }
  cancelEditCustomField();
}

function cancelEditCustomField() {
  editingCustomFieldKey = null;
  document.getElementById('cf-label').value = '';
  document.getElementById('cf-key').value = '';
  document.getElementById('cf-key').disabled = false;
  document.getElementById('cf-type').value = 'text';
  document.getElementById('cf-options').value = '';
  document.getElementById('cf-submit-btn').textContent = 'Add Field';
  document.getElementById('cf-submit-btn').onclick = addCustomField;
  document.getElementById('cf-cancel-btn').style.display = 'none';
  toggleCfOptions();
}

async function importJSON() {
  try {
    const [handle] = await window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
    const file = await handle.getFile();
    const text = await file.text();
    const imported = JSON.parse(text);
    if (imported.vehicles) {
      S.data.vehicles = imported.vehicles;
      // Ensure sortOrder exists on all imported vehicles
      S.data.vehicles.forEach((v, i) => { if (v.sortOrder === undefined || v.sortOrder === null) v.sortOrder = i; });
    }
    if (imported.bookings) S.data.bookings = imported.bookings;
    if (imported.settings) Object.assign(S.data.settings, imported.settings);
    markDirty(); render(); showToast('Data imported successfully', 'success');
  } catch (e) { if (e.name !== 'AbortError') showToast('Import failed: ' + e.message, 'error'); }
}

function toggleApiKeyVisibility() {
  const input = document.getElementById('api-key');
  if (!input) return;
  if (input.type === 'password') { input.type = 'text'; }
  else { input.type = 'password'; }
}

function saveApiConfig() {
  const endpoint = document.getElementById('api-endpoint').value.trim();
  const key = document.getElementById('api-key').value.trim();
  const model = document.getElementById('api-model').value.trim();
  if (endpoint) localStorage.setItem('fleethub_ai_endpoint', endpoint);
  else localStorage.removeItem('fleethub_ai_endpoint');
  if (key) localStorage.setItem('fleethub_ai_key', key);
  else localStorage.removeItem('fleethub_ai_key');
  if (model) localStorage.setItem('fleethub_ai_model', model);
  else localStorage.removeItem('fleethub_ai_model');
  showToast('API configuration saved', 'success');
  render();
}

function clearApiConfig() {
  localStorage.removeItem('fleethub_ai_endpoint');
  localStorage.removeItem('fleethub_ai_key');
  localStorage.removeItem('fleethub_ai_model');
  showToast('API configuration cleared', 'success');
  render();
}

function applyApiPreset(preset) {
  const presets = {
    openai: { endpoint: 'https://api.openai.com/v1/chat/completions', model: 'gpt-4o-mini' },
    groq: { endpoint: 'https://api.groq.com/openai/v1/chat/completions', model: 'llama-3.1-8b-instant' },
    together: { endpoint: 'https://api.together.xyz/v1/chat/completions', model: 'meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo' },
    ollama: { endpoint: 'http://localhost:11434/v1/chat/completions', model: 'llama3' },
    deepseek: { endpoint: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat' }
  };
  const p = presets[preset];
  if (!p) return;
  document.getElementById('api-endpoint').value = p.endpoint;
  document.getElementById('api-model').value = p.model;
  showToast(`Preset applied: ${preset} — fill in your API key and save`, 'info');
}

async function testApiConfig() {
  const endpoint = document.getElementById('api-endpoint').value.trim();
  const key = document.getElementById('api-key').value.trim();
  const model = document.getElementById('api-model').value.trim();
  const resultEl = document.getElementById('api-test-result');
  if (!endpoint || !key) { showToast('Endpoint and API key are required', 'error'); return; }
  resultEl.innerHTML = '<div style="padding:10px;background:var(--surface-soft);border-radius:var(--radius-sm);font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px"><span class="pulse">Testing connection...</span></div>';
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ model: model || 'gpt-4o-mini', messages: [{ role: 'user', content: 'Say hello in one word.' }], max_tokens: 10 })
    });
    if (!res.ok) {
      const errText = await res.text().catch(() => res.statusText);
      resultEl.innerHTML = `<div style="padding:10px;background:var(--destructive-bg);border:1px solid var(--destructive-border);border-radius:var(--radius-sm);font-size:13px;color:var(--destructive)">Error ${res.status}: ${esc(errText.slice(0, 200))}</div>`;
      return;
    }
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'No response';
    const modelUsed = data.model || model;
    const tokens = data.usage?.total_tokens || '?';
    resultEl.innerHTML = `<div style="padding:10px;background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--radius-sm);font-size:13px;color:var(--success)"><strong>Connected!</strong> Model: ${esc(modelUsed)} · Response: "${esc(reply)}" · Tokens: ${tokens}</div>`;
  } catch (e) {
    resultEl.innerHTML = `<div style="padding:10px;background:var(--destructive-bg);border:1px solid var(--destructive-border);border-radius:var(--radius-sm);font-size:13px;color:var(--destructive)">Connection failed: ${esc(e.message)}</div>`;
  }
}

function confirmClearAll() {
  openDialog('Clear All Data', '<p style="color:var(--destructive)">This will permanently delete all vehicles and bookings. This cannot be undone.</p>', () => {
    S.data.vehicles = [];
    S.data.bookings = [];
    markDirty(); render(); showToast('All data cleared', 'success'); return true;
  }, true);
}

// ===================== DIALOG =====================
let dialogCallback = null;

function openDialog(title, bodyHtml, onConfirm, isDanger = false) {
  document.getElementById('dialog-header').innerHTML = `${esc(title)}<button class="btn-icon" onclick="closeDialog()" style="margin-left:auto"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>`;
  document.getElementById('dialog-body').innerHTML = bodyHtml;
  document.getElementById('dialog-footer').innerHTML = `
    <button class="btn" onclick="closeDialog()">Cancel</button>
    <button class="btn ${isDanger ? 'btn-danger' : 'btn-primary'}" id="dialog-confirm" onclick="dialogConfirm()">${isDanger ? 'Delete' : 'Save'} <span style="font-size:11px;opacity:0.7;margin-left:4px">(${saveShortcut})</span></button>
  `;
  dialogCallback = onConfirm;
  document.getElementById('dialog-overlay').classList.add('active');
  setTimeout(() => document.getElementById('dialog-confirm')?.focus(), 100);
}

function closeDialog() {
  document.getElementById('dialog-overlay').classList.remove('active');
  dialogCallback = null;
}

function dialogConfirm() {
  if (dialogCallback) {
    const result = dialogCallback();
    if (result !== false) closeDialog();
  }
}

function dialogOverlayClick(e) { if (e.target === e.currentTarget) closeDialog(); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDialog();
  // Ctrl/Cmd+Enter to save in dialogs
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const dialogConfirmBtn = document.getElementById('dialog-confirm');
    if (dialogConfirmBtn && document.getElementById('dialog-overlay').classList.contains('active')) {
      e.preventDefault();
      dialogConfirmBtn.click();
    }
  }
});

// ===================== CHAT =====================
function renderChat() {
  const el = document.getElementById('chat-messages');
  el.innerHTML = S.chatMessages.map(m => {
    const avatar = m.role === 'assistant' ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
    return `<div class="chat-msg ${m.role}"><div class="chat-msg-avatar">${avatar}</div><div class="chat-msg-bubble">${esc(m.content)}</div></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || S.chatLoading) return;
  S.chatMessages.push({ id: genId(), role: 'user', content: text, timestamp: new Date() });
  input.value = '';
  renderChat();
  S.chatLoading = true;

  // Build context from fleet data
  const context = `Fleet data: ${S.data.vehicles.length} vehicles, ${S.data.bookings.length} bookings. Vehicles: ${S.data.vehicles.map(v => v.name + ' (' + v.status + ')').join(', ')}. Recent bookings: ${S.data.bookings.slice(0, 10).map(b => b.userName + ' - ' + b.purpose + ' (' + b.status + ')').join('; ')}.`;

  // Try API endpoint if configured
  const apiEndpoint = localStorage.getItem('fleethub_ai_endpoint');
  const apiKey = localStorage.getItem('fleethub_ai_key');

  let response;
  if (apiEndpoint && apiKey) {
    try {
      const res = await fetch(apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: localStorage.getItem('fleethub_ai_model') || 'gpt-4o-mini',
          messages: [
            { role: 'system', content: 'You are a fleet management AI assistant. Be concise and helpful. ' + context },
            ...S.chatMessages.map(m => ({ role: m.role, content: m.content }))
          ]
        })
      });
      const data = await res.json();
      response = data.choices?.[0]?.message?.content || 'Sorry, I could not generate a response.';
    } catch (e) { response = 'Error connecting to AI service. Check your API settings in the Settings panel.'; }
  } else {
    response = generateLocalResponse(text);
  }

  S.chatMessages.push({ id: genId(), role: 'assistant', content: response, timestamp: new Date() });
  S.chatLoading = false;
  renderChat();
}

function generateLocalResponse(query) {
  const q = query.toLowerCase();
  const vehicles = S.data.vehicles;
  const bookings = S.data.bookings;
  const available = vehicles.filter(v => v.status === 'available');
  const inUse = vehicles.filter(v => v.status === 'in-use');
  const pending = bookings.filter(b => b.status === 'pending');

  if (q.includes('available') || q.includes('free')) {
    return `There are ${available.length} available vehicle(s):\n${available.map(v => '• ' + v.name + (v.licensePlate ? ' (' + v.licensePlate + ')' : '')).join('\n')}`;
  }
  if (q.includes('summary') || q.includes('overview') || q.includes('status')) {
    return `Fleet Summary:\n• Total vehicles: ${vehicles.length}\n• Available: ${available.length}\n• In use: ${inUse.length}\n• Total bookings: ${bookings.length}\n• Pending approval: ${pending.length}`;
  }
  if (q.includes('pending')) {
    return `There are ${pending.length} pending booking(s):\n${pending.map(b => '• ' + b.userName + ' - ' + b.purpose + ' (' + fmtDate(b.periodStart) + ')').join('\n')}`;
  }
  if (q.includes('help') || q.includes('what can')) {
    return 'I can help you with:\n• "Show available vehicles" — list free vehicles\n• "Show pending bookings" — list bookings awaiting approval\n• "Fleet summary" — overview of your fleet\n• "How many vehicles?" — vehicle count\n• Configure an AI API in Settings for intelligent responses.';
  }
  return `I see you asked about "${query}". For smarter responses, configure an OpenAI-compatible API endpoint in Settings. For now, try asking about available vehicles, pending bookings, or fleet summary.`;
}

function toggleChatPanel() {
  const panel = document.getElementById('chat-panel');
  const btn = document.getElementById('chat-toggle-btn');
  panel.classList.toggle('collapsed');
  const isCollapsed = panel.classList.contains('collapsed');
  btn.innerHTML = isCollapsed
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>';
  btn.setAttribute('data-tooltip', isCollapsed ? 'Expand panel' : 'Collapse panel');
}

function clearChat() {
  S.chatMessages = [{ id: genId(), role: 'assistant', content: 'Chat cleared. How can I help with your fleet?', timestamp: new Date() }];
  renderChat();
}

// ===================== TOAST =====================
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// ===================== KEYBOARD SHORTCUTS (consolidated) =====================
document.addEventListener('keydown', e => {
  // Ctrl/Cmd+S to save (always active, even in inputs)
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); }
  // Ctrl/Cmd+N for new booking (not in inputs, not during dialog)
  if ((e.ctrlKey || e.metaKey) && e.key === 'n' && !isFormElement(e.target) && !document.getElementById('dialog-overlay')?.classList.contains('active')) { e.preventDefault(); newBooking(); }
});

function isFormElement(el) {
  const tag = el.tagName;
  return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || el.isContentEditable;
}

// ===================== GANTT TOOLTIP =====================
const ganttTooltipEl = document.getElementById('gantt-tooltip');
document.addEventListener('mousemove', (e) => {
  if (!ganttTooltipEl) return;
  // Check for data-tooltip on any element (booking bars, date cells, time cells)
  const target = e.target.closest('.gantt-booking-bar[data-tooltip], .gantt-date-cell[data-tooltip], .gantt-time-cell[data-tooltip], .gantt-row-label[data-tooltip]');
  if (target) {
    ganttTooltipEl.textContent = target.getAttribute('data-tooltip');
    ganttTooltipEl.style.display = 'block';
    ganttTooltipEl.style.left = e.clientX + 'px';
    ganttTooltipEl.style.top = (e.clientY - 40) + 'px';
    ganttTooltipEl.style.transform = 'translateX(-50%)';
  } else {
    ganttTooltipEl.style.display = 'none';
  }
});

// ===================== KEYBOARD SHORTCUTS (non-modifier keys) =====================
document.addEventListener('keydown', (e) => {
  // Only handle non-modifier shortcuts when not typing in a form element or dialog
  if (isFormElement(e.target)) return;
  if (document.getElementById('dialog-overlay')?.classList.contains('active')) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return; // Let the Ctrl/Cmd handler above deal with those

  const key = e.key.toLowerCase();

  // Tab navigation 1-5
  if (key >= '1' && key <= '5') {
    const tabIndex = parseInt(key) - 1;
    if (TABS[tabIndex]) {
      setTab(TABS[tabIndex].id);
    }
  }

  // N for new booking
  if (key === 'n') {
    newBooking();
  }
});

// ===================== INIT =====================
renderRecentFiles();

// Check File System Access API support
const hasFileAPI = ('showOpenFilePicker' in window);
if (!hasFileAPI) {
  // Hide Open/Create buttons on unsupported browsers (Safari, Firefox, mobile)
  const btnOpen = document.getElementById('btn-open');
  const btnCreate = document.getElementById('btn-create');
  if (btnOpen) btnOpen.style.display = 'none';
  if (btnCreate) btnCreate.style.display = 'none';
  // Make Import button the primary action
  const actions = document.getElementById('landing-actions');
  if (actions) {
    actions.querySelector('.btn-primary')?.classList.add('btn-primary');
    actions.insertAdjacentHTML('afterend',
      `<div style="margin-top:12px;padding:10px 14px;background:var(--info-bg);border:1px solid var(--info-border);border-radius:var(--radius-sm);font-size:13px;color:var(--info)">
        <strong>Import/Export mode:</strong> Tap <strong>Import JSON File</strong> to load your data, and use <strong>Export</strong> to save changes back to a file.
      </div>`
    );
  }
}

function loadFromInput(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      S.data = JSON.parse(reader.result);
      if (!S.data.meta) S.data.meta = { version: '1.0', lastModified: new Date().toISOString(), lockedBy: null, lockedAt: null, lockId: null };
      if (!S.data.settings) S.data.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
      if (!S.data.vehicles) S.data.vehicles = [];
      if (!S.data.bookings) S.data.bookings = [];
      // Ensure sortOrder exists on all vehicles (handles imports/legacy files)
      S.data.vehicles.forEach((v, i) => { if (v.sortOrder === undefined || v.sortOrder === null) v.sortOrder = i; });
      for (const k of Object.keys(DEFAULT_SETTINGS)) { if (!S.data.settings[k]) S.data.settings[k] = JSON.parse(JSON.stringify(DEFAULT_SETTINGS[k])); }
      S.fileName = file.name;
      S.fileHandle = null;
      saveRecentFile(file.name);
      enterApp();
      if (!hasFileAPI) showToast('Import mode — use Export to save changes', 'info');
      else showToast('File loaded', 'success');
    } catch(e) { showToast('Invalid JSON file: ' + e.message, 'error'); }
  };
  reader.readAsText(file);
  input.value = '';
}
